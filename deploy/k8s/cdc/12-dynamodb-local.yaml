# DynamoDB Local: the same feast_online table layout as the Phase 0 store, so
# the sink and the serving lookup run unmodified on the $0 plane (the smoke
# script creates the table via the boto3 endpoint_url override).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
  namespace: hm-cdc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamodb-local
  template:
    metadata:
      labels:
        app: dynamodb-local
    spec:
      containers:
        - name: dynamodb-local
          image: amazon/dynamodb-local:2.5.2
          args: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-local
  namespace: hm-cdc
spec:
  type: NodePort
  selector:
    app: dynamodb-local
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
