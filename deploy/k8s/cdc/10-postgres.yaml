# Postgres 16 with logical decoding, the CDC source of record on the local
# plane. The password below is a LOCAL-ONLY throwaway for the ephemeral kind
# cluster (never reachable off-host, never reused anywhere); the AWS showcase
# uses the RDS-managed Secrets Manager secret instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: hm-cdc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "wal_level=logical"]
          env:
            - name: POSTGRES_DB
              value: harbormaster
            - name: POSTGRES_USER
              value: hm_admin
            - name: POSTGRES_PASSWORD
              value: hm_local_pw
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "hm_admin", "-d", "harbormaster"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: hm-cdc
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
