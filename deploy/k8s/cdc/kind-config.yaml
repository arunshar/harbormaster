# kind cluster for the local CDC plane (Phase 2, gate C6). $0: everything
# in-cluster, host access via NodePort mappings.
#   30092/30093  Kafka (Strimzi nodeport listener: bootstrap + broker-0)
#   30083        Debezium Kafka Connect REST
#   30432        Postgres 16 (wal_level=logical)
#   30379        Redis
#   30800        DynamoDB Local
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: hm-cdc
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30092
        hostPort: 30092
      - containerPort: 30093
        hostPort: 30093
      - containerPort: 30083
        hostPort: 30083
      - containerPort: 30432
        hostPort: 30432
      - containerPort: 30379
        hostPort: 30379
      - containerPort: 30800
        hostPort: 30800
