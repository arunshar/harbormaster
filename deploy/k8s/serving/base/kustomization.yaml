# Phase 5 gate 5.2: base kustomization for the EKS serving front door.
# Build with `kubectl kustomize deploy/k8s/serving/base` (or kustomize
# v5); the committed golden output lives in ../golden/base.yaml and is
# checksummed by tests/e2e/test_phase5_k8s_manifests.py.
#
# The `images:` transform is the ONLY place the demo window sets the real
# image: override newName/newTag to the ECR URI pushed by the runbook, e.g.
#   kustomize edit set image harbormaster-serving=<acct>.dkr.ecr.us-east-1.amazonaws.com/harbormaster-base-serving:latest
# so no account id is ever committed.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - scaledobject-kinesis.yaml

images:
  - name: harbormaster-serving
    newName: harbormaster-serving
    newTag: latest
